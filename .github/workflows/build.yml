name: Génération Binaire ISOFU (Windows)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  compilation-matrice:
    runs-on: windows-latest

    steps:
    - name: Extraction du code source
      uses: actions/checkout@v4

    - name: Injection de l'environnement Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Installation des dépendances (PDF & Forge)
      run: |
        python -m pip install --upgrade pip
        pip install reportlab pyinstaller

    - name: Compilation de l'exécutable monolithique
      # L'argument --name forge l'identité du binaire final, écrasant le générique 'main'
      run: |
        pyinstaller --onefile --windowed --name "EPI_MANAGER_ISOFU" main.py

    - name: Exfiltration de l'artefact
      uses: actions/upload-artifact@v4
      with:
        name: EPI_MANAGER_ISOFU_Windows
        path: dist/EPI_MANAGER_ISOFU.exe